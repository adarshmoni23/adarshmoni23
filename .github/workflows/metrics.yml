name: GitHub Profile Metrics

on:
  schedule:
    - cron: "0 2 * * *"   # runs daily at 2am UTC
  push:
    branches: ["main", "master"]
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Base stats + languages + activity ──────────────────────────────
      - name: Core metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-core.svg

          user: adarshmoni23
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata

          # Languages breakdown
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          plugin_languages_threshold: 0%
          plugin_languages_colors: github

          # Recent activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 30
          plugin_activity_filter: push, pr, issue, release, fork

          # Coding habits (when you code, what editors, etc.)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          output_action: commit
          committer_message: "chore: update metrics [skip ci]"

      # ── Full year contribution calendar ────────────────────────────────
      - name: Calendar heatmap
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-calendar.svg

          user: adarshmoni23
          base: ""
          config_timezone: Asia/Kolkata

          plugin_calendar: yes
          plugin_calendar_limit: 1

          output_action: commit
          committer_message: "chore: update calendar [skip ci]"
